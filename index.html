<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My Days</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="theme-color" content="#3d2530" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Days" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <script>
    // Set theme-color from localStorage before React loads to prevent flash
    try {
      var th = JSON.parse(localStorage.getItem('mydays_theme'));
      var map = {sunset:"#3d2530",forest:"#1e3826",ocean:"#1a3050",berry:"#30203e",lisafrank:"#3a1858"};
      if (th && map[th]) document.querySelector('meta[name="theme-color"]').setAttribute('content', map[th]);
      // Custom themes: read from localStorage and extract today color
      if (th && !map[th]) {
        var ct = JSON.parse(localStorage.getItem('mydays_customThemes'));
        if (ct && ct[th] && ct[th].today) document.querySelector('meta[name="theme-color"]').setAttribute('content', ct[th].today);
      }
    } catch(e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
      })
    }
  </script>
</body>
</html>
